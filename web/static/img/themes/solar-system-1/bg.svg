<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="58%" r="22%">
      <stop offset="0%" stop-color="#fff6d4" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#f2dc8a" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#d4af37" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="goldStroke" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff2b8" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#d4af37" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#8a6518" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f2dc8a" stop-opacity="0.9"/>
    </linearGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0
                0 0.92 0 0 0
                0 0 0.55 0 0
                0 0 0 0.85 0" result="tint"/>
      <feMerge>
        <feMergeNode in="tint"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="tinyGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent background: base CSS supplies the dark gradients. -->

  <!-- Starfield (hand-placed for determinism) -->
  <g opacity="0.45" filter="url(#tinyGlow)">
    <circle cx="94" cy="140" r="1.3" fill="#ffffff"/>
    <circle cx="172" cy="320" r="1.0" fill="#ffffff"/>
    <circle cx="260" cy="220" r="1.1" fill="#ffffff"/>
    <circle cx="330" cy="510" r="1.0" fill="#ffffff"/>
    <circle cx="440" cy="180" r="1.2" fill="#ffffff"/>
    <circle cx="520" cy="420" r="1.1" fill="#ffffff"/>
    <circle cx="610" cy="120" r="1.1" fill="#ffffff"/>
    <circle cx="702" cy="360" r="1.0" fill="#ffffff"/>
    <circle cx="820" cy="210" r="1.2" fill="#ffffff"/>
    <circle cx="980" cy="140" r="1.0" fill="#ffffff"/>
    <circle cx="1040" cy="330" r="1.1" fill="#ffffff"/>
    <circle cx="1120" cy="260" r="1.0" fill="#ffffff"/>

    <circle cx="150" cy="980" r="1.2" fill="#ffffff"/>
    <circle cx="230" cy="1180" r="1.0" fill="#ffffff"/>
    <circle cx="310" cy="1040" r="1.1" fill="#ffffff"/>
    <circle cx="430" cy="1280" r="1.0" fill="#ffffff"/>
    <circle cx="540" cy="980" r="1.2" fill="#ffffff"/>
    <circle cx="670" cy="1160" r="1.0" fill="#ffffff"/>
    <circle cx="820" cy="1020" r="1.1" fill="#ffffff"/>
    <circle cx="940" cy="1220" r="1.0" fill="#ffffff"/>
    <circle cx="1090" cy="990" r="1.2" fill="#ffffff"/>

    <circle cx="180" cy="1620" r="1.1" fill="#ffffff"/>
    <circle cx="360" cy="1540" r="1.0" fill="#ffffff"/>
    <circle cx="520" cy="1680" r="1.2" fill="#ffffff"/>
    <circle cx="740" cy="1560" r="1.0" fill="#ffffff"/>
    <circle cx="910" cy="1700" r="1.1" fill="#ffffff"/>
    <circle cx="1080" cy="1580" r="1.0" fill="#ffffff"/>
  </g>

  <!-- Orbital framework -->
  <g opacity="0.90" filter="url(#softGlow)">
    <!-- Main vertical axis -->
    <path d="M600 130 L600 1690" stroke="url(#goldStroke)" stroke-width="1.8" stroke-opacity="0.65"/>

    <!-- Concentric rings -->
    <circle cx="600" cy="1040" r="120" fill="none" stroke="url(#goldStroke)" stroke-width="2.3" stroke-opacity="0.62"/>
    <circle cx="600" cy="1040" r="210" fill="none" stroke="url(#goldStroke)" stroke-width="2.2" stroke-opacity="0.52"/>
    <circle cx="600" cy="1040" r="320" fill="none" stroke="url(#goldStroke)" stroke-width="2.1" stroke-opacity="0.44"/>
    <circle cx="600" cy="1040" r="450" fill="none" stroke="url(#goldStroke)" stroke-width="2.0" stroke-opacity="0.36"/>
    <circle cx="600" cy="1040" r="620" fill="none" stroke="url(#goldStroke)" stroke-width="2.0" stroke-opacity="0.26"/>

    <!-- Elliptical orbits -->
    <ellipse cx="610" cy="980" rx="520" ry="760" fill="none" stroke="url(#goldStroke)" stroke-width="2.1" stroke-opacity="0.32"/>
    <ellipse cx="560" cy="1100" rx="720" ry="560" fill="none" stroke="url(#goldStroke)" stroke-width="2.0" stroke-opacity="0.28"/>
    <path d="M135 520 C 390 280, 770 190, 1090 360" fill="none" stroke="url(#goldStroke)" stroke-width="2.0" stroke-opacity="0.22"/>

    <!-- Fine grid arcs -->
    <path d="M220 1040 A380 380 0 0 0 980 1040" fill="none" stroke="url(#goldStroke)" stroke-width="1.2" stroke-opacity="0.22"/>
    <path d="M260 1040 A340 340 0 0 1 940 1040" fill="none" stroke="url(#goldStroke)" stroke-width="1.15" stroke-opacity="0.18"/>
    <path d="M310 1040 A290 290 0 0 0 890 1040" fill="none" stroke="url(#goldStroke)" stroke-width="1.1" stroke-opacity="0.16"/>

    <!-- Nodes -->
    <g>
      <circle cx="600" cy="210" r="18" fill="none" stroke="url(#goldStroke)" stroke-width="2" stroke-opacity="0.6"/>
      <circle cx="600" cy="210" r="4" fill="#f2dc8a" fill-opacity="0.55"/>

      <circle cx="600" cy="520" r="22" fill="none" stroke="url(#goldStroke)" stroke-width="2" stroke-opacity="0.5"/>
      <circle cx="600" cy="520" r="4" fill="#f2dc8a" fill-opacity="0.55"/>

      <circle cx="600" cy="1560" r="18" fill="none" stroke="url(#goldStroke)" stroke-width="2" stroke-opacity="0.5"/>
      <circle cx="600" cy="1560" r="4" fill="#f2dc8a" fill-opacity="0.55"/>

      <circle cx="1040" cy="1040" r="14" fill="none" stroke="url(#goldStroke)" stroke-width="2" stroke-opacity="0.45"/>
      <circle cx="1040" cy="1040" r="3" fill="#f2dc8a" fill-opacity="0.5"/>

      <circle cx="160" cy="1040" r="14" fill="none" stroke="url(#goldStroke)" stroke-width="2" stroke-opacity="0.45"/>
      <circle cx="160" cy="1040" r="3" fill="#f2dc8a" fill-opacity="0.5"/>
    </g>
  </g>

  <!-- Central sun glow (transparent so gradients still show) -->
  <circle cx="600" cy="1040" r="210" fill="url(#sunGlow)"/>

  <!-- Faint annotation text (generic equations; not copied from source image) -->
  <g opacity="0.16" fill="#f2dc8a" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="20">
    <text x="170" y="420">r = a(1−e²)/(1+e·cosθ)</text>
    <text x="210" y="510">Δt ≈ 2π·√(a³/μ)</text>
    <text x="740" y="450">v² = μ(2/r − 1/a)</text>

    <text x="210" y="1240">θ(t) → ωt + φ</text>
    <text x="220" y="1320">Σᵢ mᵢ rᵢ = 0</text>
    <text x="760" y="1380">d²r/dt² = −∇Φ</text>

    <text x="260" y="1620">E = mc²  ·  L = r×p</text>
  </g>
</svg>
