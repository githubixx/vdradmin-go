<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sky" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#192033" />
      <stop offset="50%" stop-color="#0e131f" />
      <stop offset="100%" stop-color="#05070a" />
    </radialGradient>
    <filter id="stars">
      <feTurbulence type="fractalNoise" baseFrequency="0.2" numOctaves="8" result="noise" />
      <feColorMatrix type="matrix" values="1 0 0 0 0  0 0.8 0 0 0  0 0.4 0 0 0  0 0 0 7 -3.5" in="noise" result="stars" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#sky)" />
  <rect width="100%" height="100%" filter="url(#stars)" opacity="0.3" />
</svg>