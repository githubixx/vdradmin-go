<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" preserveAspectRatio="none">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff1a0" />
      <stop offset="20%" stop-color="#d4af37" />
      <stop offset="50%" stop-color="#aa7c11" />
      <stop offset="80%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#fff1a0" />
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise" />
      <feColorMatrix type="matrix" values="1 0 0 0 0  0 0.8 0 0 0  0 0.4 0 0 0  0 0 0 0.15 0" in="noise" result="coloredNoise" />
      <feBlend in="SourceGraphic" in2="coloredNoise" mode="overlay" />
    </filter>
  </defs>
  <rect x="2" y="2" width="196" height="56" rx="28" fill="url(#gold-grad)" filter="url(#noise)" />
  <rect x="2" y="2" width="196" height="56" rx="28" fill="none" stroke="#ffe28a" stroke-width="2" />
</svg>